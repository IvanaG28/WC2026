  .header-icon { font-size:36px; }
  .header h1 { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  .sync-bar { display:flex; align-items:center; gap:8px; font-size:12px; margin-top:4px; }
  .sync-dot { width:8px; height:8px; border-radius:50%; background:#4ade80; flex-shrink:0; }
  .sync-dot.syncing { background:#fbbf24; animation:pulse 1s infinite; }
  .sync-dot.error { background:#f87171; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .tabs { display:flex; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:4px; margin-bottom:20px; flex-wrap:wrap; }
  .tab { flex:1; min-width:70px; padding:9px 6px; border:none; background:transparent; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer; color:var(--text2); transition:all 0.15s; }
  .tab.active { background:var(--green-dark); color:#fff; }
  .tab:hover:not(.active) { background:var(--surface2); }

  .card-title { font-size:14px; font-weight:600; margin-bottom:12px; color:var(--text); }
  .badge { background:var(--green-dark); color:#fff; font-size:11px; padding:2px 8px; border-radius:20px; font-weight:600; }
  .lb-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
  .lb-row:last-child { border-bottom:none; }
  .lb-rank { width:26px; height:26px; border-radius:50%; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--text2); flex-shrink:0; }
  .lb-rank.r1 { background:#f0b429; color:#7a5200; }
  .lb-rank.r2 { background:#c0c0c0; color:#444; }
  .lb-rank.r3 { background:#cd7f32; color:#fff; }
  .lb-name { flex:1; font-weight:500; font-size:13px; }
  .lb-pts { font-size:17px; font-weight:700; color:var(--green-mid); min-width:40px; text-align:right; }
  .lb-breakdown { font-size:11px; color:var(--text3); min-width:72px; text-align:right; }
  .lb-bar { height:4px; background:var(--surface2); border-radius:2px; flex:1; overflow:hidden; max-width:90px; }
  .lb-bar-fill { height:100%; background:var(--green-light); border-radius:2px; }
  .match-row { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--surface2); border-radius:8px; margin-bottom:5px; flex-wrap:wrap; }
  .match-teams { flex:1; font-size:13px; font-weight:500; min-width:150px; }
  .match-meta { font-size:11px; color:var(--text3); }
  .match-score-input { display:flex; align-items:center; gap:5px; }
  .score-box { width:42px; padding:6px 4px; text-align:center; border:1px solid var(--border); border-radius:6px; font-size:14px; font-weight:700; background:var(--surface); color:var(--text); }
  .score-box:focus { outline:2px solid var(--green-mid); }
  .score-sep { font-weight:700; color:var(--text3); }
  .match-status { font-size:11px; padding:3px 8px; border-radius:12px; font-weight:600; white-space:nowrap; background:var(--surface2); color:var(--text3); border:1px solid var(--border); }
  .status-done { background:#e8f5e9!important; color:#2a7a45!important; border:1px solid #a8d5b0!important; }

  input[type=file] { display:none; }
  .pred-table { width:100%; border-collapse:collapse; font-size:12px; }

  .pred-hit-1 { background:#fef3c7; color:#92400e; border-radius:4px; padding:1px 6px; font-weight:700; }
  .pred-miss { color:var(--text3); }

  .btn-primary { background:var(--green-dark); color:#fff; }

  .btn-sm { padding:5px 10px; font-size:12px; }
  .btn-danger { background:#fee2e2; color:#991b1b; }
  .btn-danger:hover { background:#fca5a5; }
  .btn-warning { background:#fef3c7; color:#92400e; }

  .empty { text-align:center; padding:28px; color:var(--text3); font-size:14px; }

// ── PIN UTILS ──────────────────────────────────────────────────────────────────
async function hashPin(pin) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function isDeadlinePassed() {
  return new Date() > DEADLINE;
}

function deadlineStr() {
  return DEADLINE.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) + ' at 23:59';
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openPinModal(title, sub, onSuccess) {
  document.getElementById('pinModalTitle').textContent = title;
  document.getElementById('pinModalSub').textContent = sub;
  document.getElementById('pinInput').value = '';
  document.getElementById('pinError').textContent = '';
  document.getElementById('pinModal').classList.remove('hidden');
  document.getElementById('pinInput').focus();
  pendingPinAction = onSuccess;
}
function closeModal() {
  document.getElementById('pinModal').classList.add('hidden');
  pendingPinAction = null;
}
async function submitPin() {
  const pin = document.getElementById('pinInput').value;
  if (!pin) return;
  const hash = await hashPin(pin);
  if (hash === ADMIN_PIN_HASH) {
    adminUnlocked = true;
    document.getElementById('pinError').textContent = '';
    closeModal();
    if (pendingPinAction) pendingPinAction();
  } else {
    document.getElementById('pinError').textContent = '❌ Incorrect PIN';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}

function requireAdmin(action) {
  if (adminUnlocked) { action(); return; }
  openPinModal('🔐 Admin access required', 'Enter your admin PIN to continue', action);
}

// ── GOOGLE SHEETS SYNC ─────────────────────────────────────────────────────────
async function loadFromSheets() {
  setSyncStatus('syncing','Syncing...');
  try {
    const res = await fetch(GS_URL+'?t='+Date.now());
    const data = await res.json();
    if (data.matches) {
      state.matches = SCHEDULE.map(m=>{
        const sv=data.matches.find(x=>x.id===m.id);
        return {...m,homeScore:sv?.homeScore??null,awayScore:sv?.awayScore??null};
      });
    }
    if (data.players) state.players = data.players;
    if (data.log) state.log = data.log;
    setSyncStatus('ok','Live · '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
    renderTab(state.activeTab);
  } catch(e) { setSyncStatus('error','Sync failed — retrying'); }
}

async function saveToSheets() {
  if (state.saving) return;
  state.saving = true;
  setSyncStatus('syncing','Saving...');
  showToast('Saving...');
  try {
    const payload = {
      matches: state.matches.map(m=>({id:m.id,homeScore:m.homeScore,awayScore:m.awayScore})),
      players: state.players,
      log: state.log
    };
    await fetch(GS_URL,{method:'POST',body:JSON.stringify(payload)});
    setSyncStatus('ok','Saved · '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
    showToast('✅ Saved!');
  } catch(e) { setSyncStatus('error','Save failed'); showToast('❌ Save failed'); }
  state.saving = false;
}

function setSyncStatus(status,msg){
  const dot=document.getElementById('syncDot'); const txt=document.getElementById('syncStatus');
  if(!dot||!txt) return;
  dot.className='sync-dot'+(status==='syncing'?' syncing':status==='error'?' error':'');
  txt.textContent=msg;
}
function showToast(msg){
  const t=document.getElementById('toast'); if(!t) return;
  t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}
function addLog(action,name,note=''){
  state.log.unshift({action,name,timestamp:new Date().toISOString(),note});
  if(state.log.length>100) state.log=state.log.slice(0,100);
}

// ── SCORING ────────────────────────────────────────────────────────────────────
function getResult(h,a){return h>a?'H':a>h?'A':'D';}
function scoreForMatch(pred,match){
  if(match.homeScore===null||match.awayScore===null) return {pts:0,type:'pending'};
  if(pred.home===null||pred.home===undefined) return {pts:0,type:'no_pred'};
  if(pred.home===match.homeScore&&pred.away===match.awayScore) return {pts:3,type:'exact'};
  if(getResult(pred.home,pred.away)===getResult(match.homeScore,match.awayScore)) return {pts:1,type:'result'};
  return {pts:0,type:'miss'};
}
function calcScore(player){
  let total=0,exact=0,result=0;
  state.matches.forEach(m=>{
    if(m.homeScore===null) return;
    const pred=player.predictions[m.id]||{};
    const s=scoreForMatch({home:pred.home??null,away:pred.away??null},m);
    total+=s.pts; if(s.type==='exact') exact++; if(s.type==='result') result++;
  });
  return {total,exact,result};
}
function getLeaderboard(){
  return state.players.map(p=>({...p,...calcScore(p)})).sort((a,b)=>b.total-a.total||b.exact-a.exact);
}

// ── EXCEL PARSER ───────────────────────────────────────────────────────────────
function processFile(file, isAdminOverride){
  if(!window.XLSX){showUploadStatus('Excel library not loaded, please try again.','error',isAdminOverride);return;}
  const deadlinePassed=isDeadlinePassed();

  const reader=new FileReader();
  reader.onload=function(e){
    try {
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const sheetName=wb.SheetNames.find(s=>s.toLowerCase().includes('pred'))||wb.SheetNames[0];
      const ws=wb.Sheets[sheetName];
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

      // Read name from D1
      const playerName=String(data[0]?.[3]||'').trim();
      if(!playerName){
        showUploadStatus('❌ No name found in cell D1. Make sure you filled in your name at the top.','error',isAdminOverride);
        return;
      }

      // Check if already locked (non-admin)
      const existing=state.players.find(p=>p.name===playerName);
      if(!isAdminOverride){
        if(deadlinePassed){
          showUploadStatus(`❌ The submission deadline has passed. No new submissions are accepted.`,'error',false);
          return;
        }
        if(existing&&existing.locked){
          showUploadStatus(`❌ ${playerName} has already submitted. Predictions are locked and cannot be changed.`,'error',false);
          return;
        }
      }

      // Parse predictions
      const predictions={};
      let matched=0;
      for(let r=3;r<data.length;r++){
        const row=data[r];
        const matchId=parseInt(row[0]);
        if(isNaN(matchId)||matchId<1||matchId>72) continue;
        const h=parseInt(row[4]), a=parseInt(row[6]);
        if(!isNaN(h)&&!isNaN(a)&&h>=0&&a>=0){predictions[matchId]={home:h,away:a};matched++;}
      }

      const now=new Date().toISOString();
      const exIdx=state.players.findIndex(p=>p.name===playerName);
      let action='';
      if(exIdx>=0){
        state.players[exIdx].predictions=predictions;
        state.players[exIdx].submittedAt=now;
        state.players[exIdx].locked=true;
        action=isAdminOverride?'admin_reupload':'resubmit';
      } else {
        state.players.push({name:playerName,predictions,submittedAt:now,locked:true});
        action='submit';
      }

      addLog(action,playerName,`${matched} predictions${isAdminOverride?' (admin override)':''}`);
      saveToSheets();
      showUploadStatus(`✅ ${playerName} — ${matched} predictions submitted and locked.`,'ok',isAdminOverride);
      renderTab('submit');
    } catch(err){ showUploadStatus('❌ Error reading file: '+err.message,'error',isAdminOverride); }
  };
  reader.readAsBinaryString(file);
}

function showUploadStatus(msg,type,isAdmin){
  const id=isAdmin?'admin-upload-status':'upload-status';
  const el=document.getElementById(id);
  if(el){el.textContent=msg;el.style.color=type==='error'?'#e53e3e':'#059669';}
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function fmtDate(iso){
  try{return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}
  catch{return iso;}
}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadFromSheets();
setInterval(loadFromSheets,30000);
</script>
