// ─── GOOGLE SHEETS SYNC ───────────────────────────────────────────────────────
async function loadFromSheets() {
  setSyncStatus('syncing', 'Syncing...');
  try {
    const res = await fetch(GS_URL + '?t=' + Date.now());
    const data = await res.json();
    if (data.matches) {
      state.matches = SCHEDULE.map(m => {
        const sv = data.matches.find(x => x.id === m.id);
        return {...m, homeScore: sv?.homeScore ?? null, awayScore: sv?.awayScore ?? null};
      });
    }
    if (data.players) state.players = data.players;
    setSyncStatus('ok', 'Live · ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}));
    renderTab(state.activeTab);
  } catch(e) {
    setSyncStatus('error', 'Sync failed — retrying');
  }
}

async function saveToSheets() {
  if (state.saving) return;
  state.saving = true;
  setSyncStatus('syncing', 'Saving...');
  showToast('Saving...');
  try {
    const payload = {
      matches: state.matches.map(m => ({id: m.id, homeScore: m.homeScore, awayScore: m.awayScore})),
      players: state.players
    };
    await fetch(GS_URL, { method: 'POST', body: JSON.stringify(payload) });
    setSyncStatus('ok', 'Saved · ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}));
    showToast('✅ Saved!');
  } catch(e) {
    setSyncStatus('error', 'Save failed');
    showToast('❌ Save failed');
  }
  state.saving = false;
}

function setSyncStatus(status, msg) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncStatus');
  if (!dot || !txt) return;
  dot.className = 'sync-dot' + (status === 'syncing' ? ' syncing' : status === 'error' ? ' error' : '');
  txt.textContent = msg;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── SCORING ─────────────────────────────────────────────────────────────────
function getResult(h, a) { return h > a ? 'H' : a > h ? 'A' : 'D'; }
function scoreForMatch(pred, match) {
  if (match.homeScore === null || match.awayScore === null) return {pts: 0, type: 'pending'};
  if (pred.home === null || pred.home === undefined) return {pts: 0, type: 'no_pred'};
  if (pred.home === match.homeScore && pred.away === match.awayScore) return {pts: 3, type: 'exact'};
  if (getResult(pred.home, pred.away) === getResult(match.homeScore, match.awayScore)) return {pts: 1, type: 'result'};
  return {pts: 0, type: 'miss'};
}
function calcScore(player) {
  let total = 0, exact = 0, result = 0;
  state.matches.forEach(m => {
    if (m.homeScore === null) return;
    const pred = player.predictions[m.id] || {};
    const s = scoreForMatch({home: pred.home ?? null, away: pred.away ?? null}, m);
    total += s.pts;
    if (s.type === 'exact') exact++;
    if (s.type === 'result') result++;
  });
  return {total, exact, result};
}
function getLeaderboard() {
  return state.players.map(p => ({...p, ...calcScore(p)})).sort((a, b) => b.total - a.total || b.exact - a.exact);
}

  state.activeTab = tab;

  });
  ['leaderboard','scores','predictions','setup'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  renderTab(tab);
}

  else if (tab === 'scores') renderScores();
  else if (tab === 'predictions') renderPredictions();
  else if (tab === 'setup') renderSetup();
}

// ─── LEADERBOARD ─────────────────────────────────────────────────────────────
function renderLeaderboard() {
  const el = document.getElementById('tab-leaderboard');
  const lb = getLeaderboard();
  const played = state.matches.filter(m => m.homeScore !== null).length;
  const maxPts = lb.length ? Math.max(lb[0].total, 1) : 1;
  let html = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${state.players.length}</div><div class="stat-label">Participants</div></div>
    <div class="stat-card"><div class="stat-num">${played}</div><div class="stat-label">Played</div></div>
    <div class="stat-card"><div class="stat-num">${state.matches.length - played}</div><div class="stat-label">Remaining</div></div>
  </div>`;
  if (!state.players.length) {
    html += `<div class="card"><div class="empty"><div class="empty-icon">👥</div>No participants yet. Upload predictions in Setup.</div></div>`;
  } else {
    html += `<div class="card"><div class="card-title">🏆 Standings</div>`;
    lb.forEach((p, i) => {
      const rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
      html += `<div class="lb-row">
        <div class="lb-rank ${rc}">${i + 1}</div>
        <div class="lb-name">${esc(p.name)}</div>
        <div class="lb-bar"><div class="lb-bar-fill" style="width:${Math.round(p.total / maxPts * 100)}%"></div></div>
        <div class="lb-breakdown">✅${p.exact} ✔️${p.result}</div>
        <div class="lb-pts">${p.total}pts</div>
      </div>`;
    });
    html += `</div>`;
  }
  el.innerHTML = html;
}

// ─── SCORES ───────────────────────────────────────────────────────────────────
function renderScores() {
  const el = document.getElementById('tab-scores');
  const groups = ['ALL','A','B','C','D','E','F','G','H','I','J','K','L'];
  const f = state.scoreGroupFilter || 'ALL';
  let html = `<div class="group-filter">`;
  groups.forEach(g => { html += `<button class="gf-btn ${f === g ? 'active' : ''}" onclick="setGroupFilter('${g}')">${g === 'ALL' ? 'All' : 'Grp ' + g}</button>`; });
  html += `</div>`;
  const filtered = state.matches.filter(m => f === 'ALL' || m.group === f);
  const byDate = {};
  filtered.forEach(m => { if (!byDate[m.date]) byDate[m.date] = []; byDate[m.date].push(m); });
  const fmt = d => new Date(d + 'T12:00:00').toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
  html += `<div class="card"><div class="card-title">📋 Enter Match Results</div>`;
  Object.keys(byDate).sort().forEach(date => {
    html += `<div class="day-header">${fmt(date)}</div>`;
    byDate[date].forEach(m => {
      const done = m.homeScore !== null;
      html += `<div class="match-row">
        <div style="flex:1;min-width:150px">
          <div class="match-teams">${esc(m.home)} <span style="color:var(--text3)">vs</span> ${esc(m.away)}</div>
          <div class="match-meta">Group ${m.group} · ${m.kickoff} · ${esc(m.venue)}</div>
        </div>
        <div class="match-score-input">
          <input class="score-box" type="number" min="0" max="20" value="${done ? m.homeScore : ''}" placeholder="?" id="h${m.id}" onchange="setScore(${m.id})">
          <span class="score-sep">–</span>
          <input class="score-box" type="number" min="0" max="20" value="${done ? m.awayScore : ''}" placeholder="?" id="a${m.id}" onchange="setScore(${m.id})">
        </div>
        <span class="match-status ${done ? 'status-done' : ''}">${done ? m.homeScore + ' – ' + m.awayScore : 'Pending'}</span>
        ${done ? `<button class="btn btn-sm btn-danger" onclick="clearScore(${m.id})">✕</button>` : ''}
      </div>`;
    });
  });
  html += `</div>`;
  el.innerHTML = html;
}

function setGroupFilter(g) { state.scoreGroupFilter = g; renderTab('scores'); }
function setScore(id) {
  const h = parseInt(document.getElementById('h' + id)?.value);
  const a = parseInt(document.getElementById('a' + id)?.value);
  const m = state.matches.find(x => x.id === id);
  if (!m || isNaN(h) || isNaN(a) || h < 0 || a < 0) return;
  m.homeScore = h; m.awayScore = a;
  saveToSheets(); renderTab('scores');
}
function clearScore(id) {
  const m = state.matches.find(x => x.id === id);
  if (m) { m.homeScore = null; m.awayScore = null; saveToSheets(); renderTab('scores'); }
}

// ─── PREDICTIONS ──────────────────────────────────────────────────────────────
function renderPredictions() {
  const el = document.getElementById('tab-predictions');
  if (!state.players.length) { el.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon">🔍</div>No predictions loaded yet.</div></div>`; return; }
  const sel = state.selectedPlayer || state.players[0].name;
  state.selectedPlayer = sel;
  const player = state.players.find(p => p.name === sel);
  let html = `<div class="player-pills">`;
  state.players.forEach(p => {
    const s = calcScore(p);
    const safeName = p.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    html += `<div class="pill ${p.name === sel ? 'active' : ''}" onclick="selectPlayer('${safeName}')">${esc(p.name)} <strong>${s.total}pts</strong></div>`;
  });
  html += `</div>`;
  if (player) {
    const s = calcScore(player);
    html += `<div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${s.total}</div><div class="stat-label">Total points</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#059669">${s.exact}</div><div class="stat-label">Exact (3pts)</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#d97706">${s.result}</div><div class="stat-label">Result (1pt)</div></div>
    </div>`;
    html += `<div class="card"><div class="scroll-x"><table class="pred-table"><thead><tr><th>Match</th><th>Grp</th><th>Prediction</th><th>Actual</th><th>Pts</th></tr></thead><tbody>`;
    state.matches.forEach(m => {
      const pred = player.predictions[m.id] || {};
      const hasPred = pred.home !== null && pred.home !== undefined;
      const hasResult = m.homeScore !== null;
      const s = hasPred ? scoreForMatch({home: pred.home, away: pred.away}, m) : {pts: 0, type: 'no_pred'};
      let badge = `<span class="pred-miss">—</span>`;
      if (hasResult) {
        if (!hasPred) badge = `<span class="pred-miss">0</span>`;
        else if (s.type === 'exact') badge = `<span class="pred-hit-3">+3</span>`;
        else if (s.type === 'result') badge = `<span class="pred-hit-1">+1</span>`;
        else badge = `<span class="pred-miss">0</span>`;
      }
      html += `<tr><td>${esc(m.home)} vs ${esc(m.away)}</td><td><span class="badge">${m.group}</span></td><td>${hasPred ? `${pred.home}–${pred.away}` : '<span style="color:var(--text3)">—</span>'}</td><td>${hasResult ? `<strong>${m.homeScore}–${m.awayScore}</strong>` : '<span style="color:var(--text3)">TBD</span>'}</td><td>${badge}</td></tr>`;
    });
    html += `</tbody></table></div></div>`;
  }
  el.innerHTML = html;
}
function selectPlayer(name) { state.selectedPlayer = name; renderTab('predictions'); }

// ─── SETUP ────────────────────────────────────────────────────────────────────
function renderSetup() {
  const el = document.getElementById('tab-setup');
  let html = `<div class="template-note">📥 <strong>Step 1:</strong> Share the predictions Excel template with participants — they fill in scores as <code>2-1</code> or <code>0-0</code>.<br><strong>Step 2:</strong> Collect all sheets into one Excel file and upload here. Everyone sees scores and leaderboard live.</div>
  <div class="card"><div class="card-title">📤 Upload Predictions Excel</div>
    <div class="upload-area" onclick="document.getElementById('xlFile').click()" id="dropzone">
      <div style="font-size:32px;margin-bottom:10px">📊</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:5px">Click to upload Excel file</div>
      <div style="font-size:12px;color:var(--text3)">Player Name in column A · scores as Home-Away</div>
    </div>
    <input type="file" id="xlFile" accept=".xlsx,.xls" onchange="handleFile(this)">
    <div id="upload-status" style="margin-top:10px;font-size:13px;"></div>
  </div>
  <div class="card"><div class="card-title">👥 Participants (${state.players.length})</div>`;
  if (!state.players.length) {
    html += `<div class="empty"><div class="empty-icon">👤</div>No participants yet.</div>`;
  } else {
    html += `<div class="player-pills">`;
    state.players.forEach(p => {
      const safeName = p.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      html += `<div class="pill">${esc(p.name)} <span style="cursor:pointer;color:#e53e3e;margin-left:4px" onclick="removePlayer('${safeName}')">✕</span></div>`;
    });
    html += `</div><button class="btn btn-danger btn-sm" onclick="if(confirm('Clear all participants?')){state.players=[];saveToSheets();renderTab('setup');}">Clear all</button>`;
  }
  html += `</div><div class="card"><div class="card-title">✏️ Add participant manually</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input id="newName" placeholder="Player name" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);flex:1;min-width:140px">
      <button class="btn btn-primary" onclick="addManual()">Add</button>
    </div></div>`;
  el.innerHTML = html;
  const dz = document.getElementById('dropzone');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor = 'var(--green-mid)'; });
    dz.addEventListener('dragleave', () => { dz.style.borderColor = ''; });
    dz.addEventListener('drop', e => { e.preventDefault(); dz.style.borderColor = ''; const f = e.dataTransfer.files[0]; if (f) processFile(f); });
  }
}

function addManual() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return;
  if (state.players.find(p => p.name === name)) { alert('Already exists'); return; }
  state.players.push({name, predictions: {}});
  saveToSheets(); renderTab('setup');
}
function removePlayer(name) { state.players = state.players.filter(p => p.name !== name); saveToSheets(); renderTab('setup'); }
function handleFile(input) { if (input.files[0]) processFile(input.files[0]); }
function processFile(file) {
  if (!window.XLSX) { showUploadStatus('Excel library not loaded yet, please try again in a moment.', 'error'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type: 'binary'});
      const sheetName = wb.SheetNames.find(s => s.toLowerCase().includes('pred')) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const data = XLSX.utils.sheet_to_json(ws, {header: 1});
      if (data.length < 2) { showUploadStatus('File appears empty.', 'error'); return; }
      const headers = data[0];
      const matchCols = {};
      headers.forEach((h, i) => {
        if (i === 0 || !h) return;
        const str = String(h);
        state.matches.forEach(m => { if (str.includes(m.home) && str.includes(m.away)) matchCols[i] = m.id; });
      });
      let added = 0, updated = 0;
      for (let r = 1; r < data.length; r++) {
        const row = data[r];
        const name = row[0]?.toString().trim();
        if (!name) continue;
        const predictions = {};
        Object.entries(matchCols).forEach(([ci, mid]) => {
          const val = row[ci]?.toString().trim();
          if (val && val.includes('-')) {
            const parts = val.split('-');
            const h = parseInt(parts[0]), a = parseInt(parts[1]);
            if (!isNaN(h) && !isNaN(a)) predictions[mid] = {home: h, away: a};
          }
        });
        const ex = state.players.findIndex(p => p.name === name);
        if (ex >= 0) { state.players[ex].predictions = {...state.players[ex].predictions, ...predictions}; updated++; }
        else { state.players.push({name, predictions}); added++; }
      }
      saveToSheets();
      showUploadStatus(`✅ ${added} new, ${updated} updated · ${Object.keys(matchCols).length} matches matched`, 'ok');
      renderTab('setup');
    } catch(err) { showUploadStatus('❌ Error: ' + err.message, 'error'); }
  };
  reader.readAsBinaryString(file);
}
function showUploadStatus(msg, type) {
  const el = document.getElementById('upload-status');
  if (el) { el.textContent = msg; el.style.color = type === 'error' ? '#e53e3e' : '#059669'; }
}
function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadFromSheets();
setInterval(loadFromSheets, 30000);
</script>
</body>
</html>
